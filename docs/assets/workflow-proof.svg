  <text x="48" y="82" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="15">Each step is covered by a dedicated Jest integration test (305 total).</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#0F172A">
    <rect x="48" y="110" width="220" height="72" rx="14" fill="#DBEAFE"/><text x="64" y="138" font-weight="700">1. Custom Post Types</text><text x="64" y="160" fill="#475569">customPostTypes.test.js</text>
    <rect x="292" y="110" width="220" height="72" rx="14" fill="#DBEAFE"/><text x="308" y="138" font-weight="700">2. Publish CPT item</text><text x="308" y="160" fill="#475569">customPostTypes.test.js</text>
    <rect x="536" y="110" width="220" height="72" rx="14" fill="#DCFCE7"/><text x="552" y="138" font-weight="700">3. Field groups</text><text x="552" y="160" fill="#475569">customFields.test.js</text>
    <rect x="780" y="110" width="272" height="72" rx="14" fill="#DCFCE7"/><text x="796" y="138" font-weight="700">4. Fields on public site</text><text x="796" y="160" fill="#475569">customFields.test.js</text>
    <rect x="48" y="210" width="220" height="72" rx="14" fill="#FEF3C7"/><text x="64" y="238" font-weight="700">5. Revisions / restore</text><text x="64" y="260" fill="#475569">revisionsAutosave.test.js</text>
