    <rect x="536" y="210" width="220" height="72" rx="14" fill="#EDE9FE"/><text x="552" y="238" font-weight="700">7. Templates / FSE</text><text x="552" y="260" fill="#475569">templatesFse.test.js</text>
    <rect x="780" y="210" width="272" height="72" rx="14" fill="#FFE4E6"/><text x="796" y="238" font-weight="700">89. Import / Export</text><text x="796" y="260" fill="#475569">importExport.integration.test.js</text>
    <rect x="48" y="310" width="220" height="72" rx="14" fill="#E0E7FF"/><text x="64" y="338" font-weight="700">10. Multisite / network</text><text x="64" y="360" fill="#475569">networkMultisite.test.js</text>
    <rect x="292" y="310" width="220" height="72" rx="14" fill="#E0E7FF"/><text x="308" y="338" font-weight="700">11. Plugins / themes</text><text x="308" y="360" fill="#475569">pluginsLifecycleIntegration.test.js</text>
