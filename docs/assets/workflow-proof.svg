  <rect x="48" y="420" width="1004" height="170" rx="18" fill="#111827" stroke="#334155"/>
  <text x="72" y="456" fill="#38BDF8" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Automated verification</text>
  <text x="72" y="486" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="14">npm run test:ci  ’  ESLint + Jest (MySQL) + coverage thresholds + npm audit + Docker smoke test</text>
