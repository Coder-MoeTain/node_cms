name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: nodepress_cms_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      NODE_ENV: test
      APP_URL: http://localhost:3000
      SESSION_SECRET: ci-session-secret-change-me
      TEST_DB_HOST: 127.0.0.1
      TEST_DB_PORT: 3306
      TEST_DB_NAME: nodepress_cms_test
      TEST_DB_USER: root
      TEST_DB_PASSWORD: root
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Wait for MySQL service
        run: node scripts/wait-for-mysql.js
      - run: npm run test:ci
      - name: Report coverage summary
        run: node scripts/coverage-summary.js
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build and smoke test with Docker Compose
        env:
          SESSION_SECRET: ci-docker-session-secret-change-me
          DB_PASSWORD: rootsecret
        run: |
          docker compose up -d --build --wait --timeout 180
          curl -fsS http://127.0.0.1:3000/health
          curl -fsS http://127.0.0.1:3000/ready
          curl -fsS -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/ | grep -E '200|302'
          curl -fsS -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/admin/login | grep 200
          docker compose exec -T app node scripts/health-check.js
          docker compose down -v
