name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
  push:
    tags:
      - 'v*'

jobs:
  predeploy:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: nodepress_cms_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      NODE_ENV: test
      APP_URL: http://localhost:3000
      SESSION_SECRET: deploy-session-secret
      TEST_DB_HOST: 127.0.0.1
      TEST_DB_PORT: 3306
      TEST_DB_NAME: nodepress_cms_test
      TEST_DB_USER: root
      TEST_DB_PASSWORD: root
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:ci

  deploy:
    runs-on: ubuntu-latest
    needs: predeploy
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4
      - name: Build production image
        run: docker build -t nodepress-cms:${{ github.sha }} .

      - name: Check deploy secrets
        id: deploy_ready
        run: |
          if [ -n "${{ secrets.DEPLOY_HOST }}" ] && [ -n "${{ secrets.DEPLOY_USER }}" ] && [ -n "${{ secrets.DEPLOY_SSH_KEY }}" ] && [ -n "${{ secrets.DEPLOY_PATH }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy over SSH
        if: steps.deploy_ready.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_REF: ${{ github.ref_name == 'main' && 'main' || github.ref_name }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          envs: DEPLOY_PATH,DEPLOY_REF
          script: |
            set -euo pipefail
            export NODE_ENV=production
            cd "$DEPLOY_PATH"
            git fetch origin "$DEPLOY_REF"
            git checkout "$DEPLOY_REF"
            git pull --ff-only origin "$DEPLOY_REF"
            npm ci --omit=dev
            npm run migrate
            if command -v pm2 >/dev/null 2>&1 && pm2 describe nodepress-cms >/dev/null 2>&1; then
              npm run pm2:reload
            elif command -v pm2 >/dev/null 2>&1; then
              npm run pm2:start:prod
            else
              echo "pm2 not installed on target; run npm start manually"
            fi
            if [ -f scripts/health-check.js ]; then
              node scripts/health-check.js || true
            fi

      - name: Deployment skipped (secrets not configured)
        if: steps.deploy_ready.outputs.ready != 'true'
        run: |
          echo "Image built: nodepress-cms:${{ github.sha }}"
          echo "Configure repository secrets to enable automated SSH deploy:"
          echo "  DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PATH (optional DEPLOY_PORT)"
          echo "Or run scripts/remote-deploy.sh on the server after pulling this tag."
