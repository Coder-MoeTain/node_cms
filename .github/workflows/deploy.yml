name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
  push:
    tags:
      - 'v*'

jobs:
  predeploy:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: nodepress_cms_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      NODE_ENV: test
      APP_URL: http://localhost:3000
      SESSION_SECRET: deploy-session-secret
      TEST_DB_HOST: 127.0.0.1
      TEST_DB_PORT: 3306
      TEST_DB_NAME: nodepress_cms_test
      TEST_DB_USER: root
      TEST_DB_PASSWORD: root
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run predeploy

  deploy:
    runs-on: ubuntu-latest
    needs: predeploy
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4
      - name: Build production image
        run: docker build -t nodepress-cms:${{ github.sha }} .
      - name: Deployment checklist
        run: |
          echo "Image built: nodepress-cms:${{ github.sha }}"
          echo "Run on server:"
          echo "  npm run migrate"
          echo "  npm run pm2:reload"
          echo "Configure DEPLOY_HOST / SSH secrets to automate remote rollout."
